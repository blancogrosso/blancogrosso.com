<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blanco Grosso | Portfolio 2026</title>
    <meta name="description" content="Blanco Grosso Creative Studio. Sport Design, Vibe Coding & AI-Powered Creativity. Actualizando portfolio 2026.">
    <link rel="icon" type="image/png" href="img/icons/logo blanco.png">
    <link rel="stylesheet" href="css/brand-core.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/lang-switch.js" defer></script>
</head>
<body>
    <div class="accent-glow-bg"></div>
    <div class="grid-overlay"></div>

    <div class="lang-switcher" style="position: absolute; top: 2rem; right: var(--pad, 2rem); z-index: 100;">
        <span class="lang-toggle" data-lang="es">ES</span>
        <span style="color: var(--text-dim);">/</span>
        <span class="lang-toggle" data-lang="en">EN</span>
    </div>

    <main class="landing-page">
        <div class="hero-content">
            <div class="update-badge">
                <span class="pulse-dot"></span>
                <span class="lang-es">ACTUALIZANDO PORTFOLIO 2026</span>
                <span class="lang-en">UPDATING PORTFOLIO 2026</span>
            </div>
            <h1 class="brand-logo">
                <span>BLANCO</span>
                <span>GROSSO</span>
            </h1>
            <p class="hero-tagline">Sport Design · Vibe Coding · AI Powered</p>
            <div class="hero-actions">
                <a href="portfolio.html" class="hero-cta">
                    <span class="lang-es">VER PORTFOLIO COMPLETO</span>
                    <span class="lang-en">VIEW FULL PORTFOLIO</span>
                    <span class="arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </span>
                </a>
            </div>
        </div>

        <footer class="landing-footer">
            <div class="footer-bottom">
            <span>© 2026 Blanco Grosso. <a href="apps/_internal_v1/index.html" class="secret-gate">.</a> </span>
        </div>
        </footer>
    </main>
</body>
</html>
